name: Deploy Production to VPS

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          port: ${{ secrets.PROD_VPS_PORT }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -eo pipefail
            APP_DIR=/home/itarang-crm/htdocs/crm.itarang.com
            cd "$APP_DIR"

            echo "=== Pulling latest from production branch ==="
            git fetch origin production
            git reset --hard origin/production

            echo "=== Writing .env.production from secret ==="
            umask 077
            echo "${{ secrets.PROD_ENV_FILE_B64 }}" | base64 -d > .env.production
            chmod 600 .env.production

            echo "=== Installing dependencies ==="
            npm ci --no-audit --no-fund --include=dev

            echo "=== Preparing logs directory ==="
            mkdir -p logs

            ARCHIVE_DIR=/home/itarang-crm/static_archive
            ARCHIVE_KEEP=10

            echo "=== Snapshot previous .next/static into archive ring ==="
            mkdir -p "$ARCHIVE_DIR"
            OLD_BUILD_ID=""
            if [ -f .next/BUILD_ID ]; then OLD_BUILD_ID=$(cat .next/BUILD_ID); fi
            if [ -n "$OLD_BUILD_ID" ] && [ -d .next/static ]; then
              rm -rf "$ARCHIVE_DIR/$OLD_BUILD_ID"
              cp -a .next/static "$ARCHIVE_DIR/$OLD_BUILD_ID"
              echo "Archived $OLD_BUILD_ID ($(find "$ARCHIVE_DIR/$OLD_BUILD_ID" -type f | wc -l) files)"
            else
              echo "No previous BUILD_ID/.next/static — first build or clean checkout"
            fi

            echo "=== Building Next.js (standalone) ==="
            export GITHUB_SHA=$(git rev-parse HEAD)
            echo "Building with GITHUB_SHA=$GITHUB_SHA"
            npm run build

            echo "=== Merge archived chunks into new build (stale-tab grace period) ==="
            NEW_BUILD_ID=""
            if [ -f .next/BUILD_ID ]; then NEW_BUILD_ID=$(cat .next/BUILD_ID); fi
            if [ -d "$ARCHIVE_DIR" ]; then
              for archived in "$ARCHIVE_DIR"/*/; do
                [ -d "$archived" ] || continue
                archived_id=$(basename "$archived")
                if [ "$archived_id" = "$NEW_BUILD_ID" ]; then continue; fi
                # chunks/css/media only — never manifests, BUILD_ID, or server/.
                # --ignore-existing guarantees new build artifacts always win.
                for sub in chunks css media; do
                  if [ -d "$archived/$sub" ]; then
                    mkdir -p ".next/static/$sub"
                    rsync -a --ignore-existing "$archived/$sub/" ".next/static/$sub/"
                  fi
                done
              done
              echo "After merge: $(find .next/static -type f | wc -l) files in .next/static"
            fi

            echo "=== Prune archive ring (keep $ARCHIVE_KEEP newest) ==="
            if [ -d "$ARCHIVE_DIR" ]; then
              ls -1td "$ARCHIVE_DIR"/*/ 2>/dev/null | tail -n +$((ARCHIVE_KEEP + 1)) | xargs -r rm -rf
              echo "Archive now holds $(ls -1d "$ARCHIVE_DIR"/*/ 2>/dev/null | wc -l) builds"
            fi

            echo "=== Verify every chunk referenced by the build manifest exists on disk ==="
            # Catches builds that emit a manifest referencing chunk files that
            # don't exist under .next/static/. Without this, the deploy
            # succeeds but every page 404s on a layout-level chunk and shows
            # the global error boundary.
            node -e '
              const fs = require("fs");
              const path = require("path");
              const root = ".next";
              const manifests = [
                "build-manifest.json",
                "app-build-manifest.json",
                "react-loadable-manifest.json",
              ];
              const referenced = new Set();
              for (const m of manifests) {
                const p = path.join(root, m);
                if (!fs.existsSync(p)) continue;
                const walk = (v) => {
                  if (!v) return;
                  if (typeof v === "string") {
                    if (v.startsWith("static/chunks/") || v.startsWith("static/css/")) referenced.add(v);
                  } else if (Array.isArray(v)) v.forEach(walk);
                  else if (typeof v === "object") Object.values(v).forEach(walk);
                };
                try { walk(JSON.parse(fs.readFileSync(p, "utf8"))); }
                catch (e) { console.error("Could not parse", p, e.message); }
              }
              const missing = [];
              for (const rel of referenced) {
                if (!fs.existsSync(path.join(root, rel))) missing.push(rel);
              }
              console.log("Manifest references " + referenced.size + " static files; " + missing.length + " missing on disk.");
              if (missing.length) {
                console.error("Missing:");
                missing.slice(0, 50).forEach(m => console.error("  " + m));
                if (missing.length > 50) console.error("  ... and " + (missing.length - 50) + " more");
                process.exit(1);
              }
            '

            echo "=== Assembling standalone bundle ==="
            cp .env.production .next/standalone/.env.production
            cp .env.production .next/standalone/.env
            rm -rf .next/standalone/.next/static
            cp -r .next/static .next/standalone/.next/static
            rm -rf .next/standalone/public
            if [ -d public ]; then cp -r public .next/standalone/public; fi

            echo "=== Stop pm2 + wait for port 3002 to release ==="
            # pm2 reload on a fork-mode app is effectively a restart, but Next
            # can be slow to release the port. The new process EADDRINUSEs,
            # crash-loops, pm2 gives up, and the OLD process keeps serving the
            # PREVIOUS build's HTML against the NEW build's static files —
            # that's how chunk hashes get stranded and pages 404 on assets.
            # Cycle deterministically: delete (kills PID), wait for port,
            # start fresh.
            for app in itarang-crm-new itarang-crm-web; do
              if pm2 describe "$app" > /dev/null 2>&1; then
                pm2 delete "$app" 2>/dev/null || true
              fi
            done
            for i in $(seq 1 30); do
              if ! ss -ltn 'sport = :3002' 2>/dev/null | grep -q ':3002'; then
                echo "Port 3002 free after ${i}s"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Port 3002 still bound after 30s — force-killing whatever holds it"
                fuser -k 3002/tcp 2>/dev/null || true
                sleep 2
              fi
              sleep 1
            done

            echo "=== Start pm2 fresh ==="
            pm2 start ecosystem.prod.config.js
            pm2 save
            pm2 ls

            echo "=== Health check ==="
            HTTP=000
            for i in $(seq 1 30); do
              sleep 2
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3002/ || echo 000)
              if echo "$HTTP" | grep -qE "^(200|301|302|307)$"; then
                echo "HTTP $HTTP after ${i} polls"
                break
              fi
            done
            if ! echo "$HTTP" | grep -qE "^(200|301|302|307)$"; then
              echo "❌ Production failed health check (HTTP $HTTP)"
              pm2 logs itarang-crm-web --lines 50 --nostream || true
              exit 1
            fi
            echo "✅ Production healthy"

            echo "=== Verify served BUILD_ID matches disk ==="
            # Detects a stale-process deploy: disk has a new BUILD_ID but the
            # running process still serves HTML tagged with the previous
            # build's id, so chunk references don't exist on disk. Fail loudly
            # rather than letting the deploy lie about success.
            DISK_BUILD_ID=$(cat .next/BUILD_ID 2>/dev/null || echo "missing")
            # Hit /login directly — / may 307 with no body so grep finds
            # nothing. -L follows redirects either way. Wrap the pipeline in
            # `|| true` so a no-match grep doesn't abort the script under
            # set -eo pipefail.
            HTML=$(curl -s -L http://127.0.0.1:3002/login 2>/dev/null || true)
            SERVED_BUILD_ID=$(printf '%s' "$HTML" | grep -oE '"b":"[a-f0-9]+"' | head -1 | cut -d'"' -f4 || true)
            echo "Disk BUILD_ID:   $DISK_BUILD_ID"
            echo "Served BUILD_ID: ${SERVED_BUILD_ID:-<not found>}"
            if [ -n "$SERVED_BUILD_ID" ] && [ "$DISK_BUILD_ID" != "$SERVED_BUILD_ID" ]; then
              echo "❌ BUILD_ID mismatch — running process is stale"
              exit 1
            fi

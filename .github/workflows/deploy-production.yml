name: Deploy Production to VPS

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ──────────────────────────────────────────────────────────────────
      # 1. Slack notify start — louder for production
      # ──────────────────────────────────────────────────────────────────
      - name: Slack notify start
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "${{ github.event.head_commit.message }}" | head -c 200 | sed 's/"/\\"/g')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":rotating_light: *PRODUCTION deploy started* \`${{ github.sha }}\`\nby ${{ github.actor }} — \`${MSG}\`\n${{ github.event.head_commit.url }}\"}" \
            "$SLACK_WEBHOOK_URL" || true

      # ──────────────────────────────────────────────────────────────────
      # 2. Checkout to detect new migration files
      # ──────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      # ──────────────────────────────────────────────────────────────────
      # 3. Hybrid migration safety: refuse to deploy if new drizzle/0*.sql
      #    migration files exist that haven't been applied to prod yet.
      #    Apply via psql first, then re-run this workflow.
      # ──────────────────────────────────────────────────────────────────
      - name: Detect new drizzle migration files
        id: migration_check
        run: |
          # Compare against last successful deploy's SHA if we can find it.
          # Otherwise compare against HEAD~1 (most recent prior commit).
          BASE_SHA=$(git log -2 --format=%H | tail -1)
          NEW_SQL=$(git diff --name-only "$BASE_SHA"..HEAD -- 'drizzle/0*.sql' 2>/dev/null || true)
          if [ -n "$NEW_SQL" ]; then
            echo "::error::New migration files detected since $BASE_SHA:"
            echo "$NEW_SQL" | sed 's/^/  - /'
            echo "::error::Apply them MANUALLY to prod RDS via psql FIRST, then re-trigger this workflow."
            echo "::error::See docs/DEPLOY_RUNBOOK.md → 'Migration policy' section."
            exit 1
          fi
          echo "No new migration files. Safe to deploy."

      # ──────────────────────────────────────────────────────────────────
      # 4. SSH deploy — same shape as sandbox, different paths/users/port.
      # ──────────────────────────────────────────────────────────────────
      - name: SSH deploy to Hostinger VPS (production)
        id: ssh_deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          port: ${{ secrets.PROD_VPS_PORT }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          command_timeout: 25m
          script_stop: true
          script: |
            set -eo pipefail
            # drone-ssh swallows stderr on failure. Force every command to echo
            # (set -x) and merge stderr into stdout so failures are debuggable.
            exec 2>&1
            set -x
            APP_DIR=/home/itarang-crm/htdocs/crm.itarang.com
            cd "$APP_DIR"

            echo "::group::Capture PREV_SHA for rollback"
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            echo "$PREV_SHA" > /tmp/itarang-prod-prev-sha
            echo "PREV_SHA=$PREV_SHA"
            echo "::endgroup::"

            echo "::group::Pull latest production"
            git fetch origin production
            git reset --hard origin/production
            NEW_SHA=$(git rev-parse HEAD)
            git log -1 --oneline
            echo "::endgroup::"

            echo "::group::Write .env.production from secret"
            umask 077
            echo "${{ secrets.PROD_ENV_FILE_B64 }}" | base64 -d | tr -d '\r' > .env.production
            chmod 600 .env.production
            echo "Wrote .env.production ($(wc -l < .env.production) lines, $(wc -c < .env.production) bytes)"
            echo "::endgroup::"

            echo "::group::Chromium system libs (skip if marker exists)"
            MARKER=/home/itarang-crm/.chromium-libs-installed
            if [ -f "$MARKER" ]; then
              echo "Marker present at $MARKER — skipping apt check."
            else
              chmod +x scripts/sandbox-system-setup.sh
              ./scripts/sandbox-system-setup.sh
              touch "$MARKER"
            fi
            echo "::endgroup::"

            echo "::group::Install deps (only if package-lock changed)"
            LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
            LAST_HASH=$(cat .last-npm-install-hash 2>/dev/null || echo "")
            if [ "$LOCK_HASH" = "$LAST_HASH" ] && [ -d node_modules ]; then
              echo "package-lock.json unchanged — skipping npm ci"
            else
              npm ci --no-audit --no-fund --include=dev
              echo "$LOCK_HASH" > .last-npm-install-hash
            fi
            echo "::endgroup::"

            echo "::group::Load .env.production into shell"
            { set +x; } 2>/dev/null
            set -a; source .env.production; set +a
            set -x
            echo "::endgroup::"

            echo "::group::Build (next build)"
            mkdir -p logs
            export GITHUB_SHA="$NEW_SHA"
            export NODE_ENV=production
            npm run build
            echo "::endgroup::"

            echo "::group::Restart pm2 (production)"
            for app in itarang-crm-web; do
              if pm2 describe "$app" > /dev/null 2>&1; then
                pm2 delete "$app" 2>/dev/null || true
              fi
            done
            fuser -k 3002/tcp 2>/dev/null || true
            sleep 2
            pm2 start ecosystem.prod.config.js
            pm2 save
            pm2 ls
            echo "::endgroup::"

            # ──────────────────────────────────────────────────────────────
            # Health check — production gets a longer window (90s)
            # ──────────────────────────────────────────────────────────────
            echo "::group::Health check 127.0.0.1:3002/api/health"
            HTTP=000
            for i in $(seq 1 90); do
              sleep 1
              HTTP=$(curl -s -o /dev/null -m 5 -w "%{http_code}" http://127.0.0.1:3002/api/health || echo 000)
              if [ "$HTTP" = "200" ]; then
                echo "HTTP 200 after ${i}s"
                break
              fi
            done
            if [ "$HTTP" != "200" ]; then
              echo "❌ /api/health returned $HTTP after 90s"
              echo '--- itarang-crm-web (last 60 lines) ---'
              pm2 logs itarang-crm-web --lines 60 --nostream || true
              exit 1
            fi
            curl -s http://127.0.0.1:3002/api/health | head -c 800
            echo ""
            echo "::endgroup::"

            echo "✅ Production deploy complete: $(git rev-parse --short HEAD)"

      # ──────────────────────────────────────────────────────────────────
      # 5. Rollback if step 4 failed
      # ──────────────────────────────────────────────────────────────────
      - name: SSH rollback (only on deploy failure)
        if: failure() && steps.ssh_deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          port: ${{ secrets.PROD_VPS_PORT }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          command_timeout: 20m
          script_stop: false
          script: |
            set -eo pipefail
            APP_DIR=/home/itarang-crm/htdocs/crm.itarang.com
            cd "$APP_DIR"
            PREV_SHA=$(cat /tmp/itarang-prod-prev-sha 2>/dev/null || echo "")
            CURRENT_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "$CURRENT_SHA" ]; then
              echo "No rollback needed"
              exit 0
            fi
            echo "Rolling back PROD to $PREV_SHA"
            git reset --hard "$PREV_SHA"
            if [ -f .env.production ]; then sed -i 's/\r$//' .env.production; fi
            { set +x; } 2>/dev/null
            set -a; source .env.production 2>/dev/null || true; set +a
            export GITHUB_SHA=$(git rev-parse HEAD)
            export NODE_ENV=production
            npm run build
            for app in itarang-crm-web; do
              if pm2 describe "$app" > /dev/null 2>&1; then pm2 delete "$app" || true; fi
            done
            fuser -k 3002/tcp 2>/dev/null || true
            sleep 2
            pm2 start ecosystem.prod.config.js
            pm2 save
            echo "✅ Rolled back PROD to $PREV_SHA"

      # ──────────────────────────────────────────────────────────────────
      # 6. Slack notify result
      # ──────────────────────────────────────────────────────────────────
      - name: Slack notify result
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ steps.ssh_deploy.outcome }}" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS="*succeeded*"
          else
            ICON=":x:"
            STATUS="*FAILED* — rollback ${{ job.status }}"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"${ICON} PRODUCTION deploy ${STATUS} \`${{ github.sha }}\`\nLogs: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL" || true

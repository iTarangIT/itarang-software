name: Deploy Sandbox to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-sandbox
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ──────────────────────────────────────────────────────────────────
      # 1. Slack notify start (no-op if SLACK_WEBHOOK_URL secret missing)
      # ──────────────────────────────────────────────────────────────────
      - name: Slack notify start
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "${{ github.event.head_commit.message }}" | head -c 200 | sed 's/"/\\"/g')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":rocket: *Sandbox deploy started* \`${{ github.sha }}\`\nby ${{ github.actor }} — \`${MSG}\`\n${{ github.event.head_commit.url }}\"}" \
            "$SLACK_WEBHOOK_URL" || true

      # ──────────────────────────────────────────────────────────────────
      # 2. SSH deploy — pulls, builds, restarts pm2, probes /api/health.
      #    Persists PREV_SHA on the VPS so the rollback step can revert.
      #
      #    Schema migrations are NOT run here — apply manually via pgAdmin
      #    BEFORE merging code that references new columns/tables.
      # ──────────────────────────────────────────────────────────────────
      - name: SSH deploy to Hostinger VPS (sandbox)
        id: ssh_deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 20m
          # script_stop:false because drone-ssh's true mode kills on ANY command
          # exit-1, including `[ -f X ]` tests inside if statements. Bash's
          # `set -eo pipefail` below handles real errors correctly.
          script_stop: false
          script: |
            set -eo pipefail
            # drone-ssh swallows stderr on failure. Merge stderr into stdout so
            # failures are debuggable.
            exec 2>&1
            set -x
            APP_DIR=/home/itarang-sandbox/htdocs/sandbox.itarang.com
            cd "$APP_DIR"

            echo "::group::Capture PREV_SHA for rollback"
            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            echo "$PREV_SHA" > /tmp/itarang-sandbox-prev-sha
            echo "PREV_SHA=$PREV_SHA"
            echo "::endgroup::"

            echo "::group::Pull latest main"
            git fetch origin main
            git reset --hard origin/main
            NEW_SHA=$(git rev-parse HEAD)
            git log -1 --oneline
            echo "::endgroup::"

            echo "::group::Write .env from secret"
            umask 077
            # Strip CR (handles CRLF-encoded secrets) so `source .env` works.
            echo "${{ secrets.SANDBOX_ENV_FILE_B64 }}" | base64 -d | tr -d '\r' > .env
            chmod 600 .env
            echo "Wrote .env ($(wc -l < .env) lines, $(wc -c < .env) bytes)"
            echo "::endgroup::"

            # ──────────────────────────────────────────────────────────────
            # Skip Chromium apt check unless marker is missing.
            # Saves ~60s per deploy. To force re-check, remove the marker:
            #   rm /home/itarang-sandbox/.chromium-libs-installed
            # ──────────────────────────────────────────────────────────────
            echo "::group::Chromium system libs"
            MARKER=/home/itarang-sandbox/.chromium-libs-installed
            if [ -f "$MARKER" ]; then
              echo "Marker present at $MARKER — skipping apt check."
            else
              chmod +x scripts/sandbox-system-setup.sh
              ./scripts/sandbox-system-setup.sh
              touch "$MARKER"
            fi
            echo "::endgroup::"

            # ──────────────────────────────────────────────────────────────
            # Skip npm ci unless package-lock.json changed since last install.
            # Saves ~20-30s per deploy on small VPS.
            # ──────────────────────────────────────────────────────────────
            echo "::group::Install deps (only if package-lock changed)"
            LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
            LAST_HASH=$(cat .last-npm-install-hash 2>/dev/null || echo "")
            if [ "$LOCK_HASH" = "$LAST_HASH" ] && [ -d node_modules ]; then
              echo "package-lock.json unchanged — skipping npm ci"
            else
              npm ci --no-audit --no-fund --include=dev
              echo "$LOCK_HASH" > .last-npm-install-hash
            fi
            echo "::endgroup::"

            echo "::group::Load .env into shell (no command tracing — secrets)"
            { set +x; } 2>/dev/null
            set -a; source .env; set +a
            set -x
            echo "::endgroup::"

            echo "::group::Build (next build)"
            mkdir -p logs
            export GITHUB_SHA="$NEW_SHA"
            echo "Building with GITHUB_SHA=$GITHUB_SHA"
            npm run build
            echo "::endgroup::"

            echo "::group::Restart pm2"
            for app in sandbox-web sandbox-worker; do
              if pm2 describe "$app" > /dev/null 2>&1; then
                pm2 delete "$app" 2>/dev/null || true
              fi
            done
            fuser -k 3003/tcp 2>/dev/null || true
            sleep 2
            pm2 start ecosystem.sandbox.config.js
            pm2 save
            pm2 ls
            echo "::endgroup::"

            # ──────────────────────────────────────────────────────────────
            # Health check — /api/health gates rollback.
            # Polls 1s × 60 = up to 60s.
            # ──────────────────────────────────────────────────────────────
            echo "::group::Health check 127.0.0.1:3003/api/health"
            HTTP=000
            for i in $(seq 1 60); do
              sleep 1
              HTTP=$(curl -s -o /dev/null -m 5 -w "%{http_code}" http://127.0.0.1:3003/api/health || echo 000)
              if [ "$HTTP" = "200" ]; then
                echo "HTTP 200 after ${i}s"
                break
              fi
            done
            if [ "$HTTP" != "200" ]; then
              echo "❌ /api/health returned $HTTP after 60s"
              echo '--- sandbox-web (last 40 lines) ---'
              pm2 logs sandbox-web --lines 40 --nostream || true
              exit 1
            fi
            curl -s http://127.0.0.1:3003/api/health | head -c 800
            echo ""
            echo "::endgroup::"

            echo "✅ Sandbox deploy complete: $(git rev-parse --short HEAD)"

      # ──────────────────────────────────────────────────────────────────
      # 3. Rollback if step 2 failed: revert to PREV_SHA, rebuild, restart.
      # ──────────────────────────────────────────────────────────────────
      - name: SSH rollback (only on deploy failure)
        if: failure() && steps.ssh_deploy.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 15m
          script_stop: false
          script: |
            set -eo pipefail
            APP_DIR=/home/itarang-sandbox/htdocs/sandbox.itarang.com
            cd "$APP_DIR"
            PREV_SHA=$(cat /tmp/itarang-sandbox-prev-sha 2>/dev/null || echo "")
            CURRENT_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "$CURRENT_SHA" ]; then
              echo "No rollback needed (PREV_SHA missing or already at PREV_SHA)"
              exit 0
            fi
            echo "Rolling back to $PREV_SHA"
            git reset --hard "$PREV_SHA"
            if [ -f .env ]; then sed -i 's/\r$//' .env; fi
            { set +x; } 2>/dev/null
            set -a; source .env 2>/dev/null || true; set +a
            export GITHUB_SHA=$(git rev-parse HEAD)
            npm run build
            for app in sandbox-web sandbox-worker; do
              if pm2 describe "$app" > /dev/null 2>&1; then pm2 delete "$app" || true; fi
            done
            fuser -k 3003/tcp 2>/dev/null || true
            sleep 2
            pm2 start ecosystem.sandbox.config.js
            pm2 save
            echo "✅ Rolled back sandbox to $PREV_SHA"

      # ──────────────────────────────────────────────────────────────────
      # 4. Slack notify result — runs in all cases (success/fail/rollback)
      # ──────────────────────────────────────────────────────────────────
      - name: Slack notify result
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ steps.ssh_deploy.outcome }}" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS="*succeeded*"
          else
            ICON=":x:"
            STATUS="*FAILED* — rollback ${{ job.status }}"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"${ICON} Sandbox deploy ${STATUS} \`${{ github.sha }}\`\nLogs: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL" || true

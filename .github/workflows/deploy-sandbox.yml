name: Deploy Sandbox to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-sandbox
  cancel-in-progress: false

env:
  APP_DIR: /home/itarang-sandbox/htdocs/sandbox.itarang.com
  LOG_DIR: /home/itarang-sandbox/deploy-logs
  CHROMIUM_MARKER: /home/itarang-sandbox/.chromium-libs-installed
  HEALTH_URL: http://127.0.0.1:3003/api/health
  PM2_APPS: "sandbox-web sandbox-worker"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ──────────────────────────────────────────────────────────────────
      # 1. Slack notify start
      # ──────────────────────────────────────────────────────────────────
      - name: Slack notify start
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "${{ github.event.head_commit.message }}" | head -c 200 | sed 's/"/\\"/g')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":rocket: *Sandbox deploy started* \`${{ github.sha }}\`\nby ${{ github.actor }} — \`${MSG}\`\n${{ github.event.head_commit.url }}\"}" \
            "$SLACK_WEBHOOK_URL" || true

      # ──────────────────────────────────────────────────────────────────
      # 2a. Sync code, capture PREV_SHA, write .env
      # ──────────────────────────────────────────────────────────────────
      - name: Sync code & write .env
        id: sync
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 5m
          script_stop: false
          envs: APP_DIR,LOG_DIR
          script: |
            set -eo pipefail
            exec 2>&1
            mkdir -p "$LOG_DIR"
            LOG_FILE="$LOG_DIR/$(date -u +%Y%m%dT%H%M%SZ)-sync.log"
            echo "Logging to: $LOG_FILE"
            exec > >(tee -a "$LOG_FILE") 2>&1

            echo ">>> [$(date -u +%H:%M:%S)] Sync starting"
            cd "$APP_DIR"

            PREV_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            echo "$PREV_SHA" > /tmp/itarang-sandbox-prev-sha
            echo "PREV_SHA=$PREV_SHA"

            echo "--- git fetch & reset ---"
            git fetch origin main
            git reset --hard origin/main
            NEW_SHA=$(git rev-parse HEAD)
            echo "NEW_SHA=$NEW_SHA"
            git log -1 --oneline

            echo "--- writing .env ---"
            umask 077
            echo "${{ secrets.SANDBOX_ENV_FILE_B64 }}" | base64 -d | tr -d '\r' > .env
            chmod 600 .env
            echo "Wrote .env ($(wc -l < .env) lines, $(wc -c < .env) bytes)"

            echo "<<< [$(date -u +%H:%M:%S)] Sync done"

      # ──────────────────────────────────────────────────────────────────
      # 2b. Install system deps (Chromium libs) only if marker is missing
      # ──────────────────────────────────────────────────────────────────
      - name: Install system deps (Chromium libs)
        id: sysdeps
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 10m
          script_stop: false
          envs: APP_DIR,LOG_DIR,CHROMIUM_MARKER
          script: |
            set -eo pipefail
            exec 2>&1
            LOG_FILE="$LOG_DIR/$(date -u +%Y%m%dT%H%M%SZ)-sysdeps.log"
            exec > >(tee -a "$LOG_FILE") 2>&1

            echo ">>> [$(date -u +%H:%M:%S)] Sysdeps check"
            cd "$APP_DIR"

            if [ -f "$CHROMIUM_MARKER" ]; then
              echo "Marker present at $CHROMIUM_MARKER — skipping apt check."
              echo "<<< [$(date -u +%H:%M:%S)] Sysdeps skipped"
              exit 0
            fi

            echo "Marker missing — running sandbox-system-setup.sh"
            chmod +x scripts/sandbox-system-setup.sh
            time ./scripts/sandbox-system-setup.sh
            touch "$CHROMIUM_MARKER"
            echo "<<< [$(date -u +%H:%M:%S)] Sysdeps installed"

      # ──────────────────────────────────────────────────────────────────
      # 2c. npm ci (skip if package-lock unchanged)
      # ──────────────────────────────────────────────────────────────────
      - name: Install npm deps
        id: npm
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 10m
          script_stop: false
          envs: APP_DIR,LOG_DIR
          script: |
            set -eo pipefail
            exec 2>&1
            LOG_FILE="$LOG_DIR/$(date -u +%Y%m%dT%H%M%SZ)-npm.log"
            exec > >(tee -a "$LOG_FILE") 2>&1

            echo ">>> [$(date -u +%H:%M:%S)] npm phase"
            cd "$APP_DIR"

            LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
            LAST_HASH=$(cat .last-npm-install-hash 2>/dev/null || echo "")
            echo "lock-hash=$LOCK_HASH last-hash=$LAST_HASH"

            if [ "$LOCK_HASH" = "$LAST_HASH" ] && [ -d node_modules ]; then
              echo "package-lock.json unchanged — skipping npm ci"
              echo "<<< [$(date -u +%H:%M:%S)] npm skipped"
              exit 0
            fi

            echo "--- running npm ci ---"
            time npm ci --no-audit --no-fund --include=dev
            echo "$LOCK_HASH" > .last-npm-install-hash
            echo "<<< [$(date -u +%H:%M:%S)] npm done"

      # ──────────────────────────────────────────────────────────────────
      # 2d. Build (next build)
      # ──────────────────────────────────────────────────────────────────
      - name: Build (next build)
        id: build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 15m
          script_stop: false
          envs: APP_DIR,LOG_DIR
          script: |
            set -eo pipefail
            exec 2>&1
            LOG_FILE="$LOG_DIR/$(date -u +%Y%m%dT%H%M%SZ)-build.log"
            exec > >(tee -a "$LOG_FILE") 2>&1

            echo ">>> [$(date -u +%H:%M:%S)] Build starting"
            cd "$APP_DIR"
            mkdir -p logs

            # Load .env without leaking values to the trace
            set -a; source .env; set +a

            export GITHUB_SHA=$(git rev-parse HEAD)
            echo "Building with GITHUB_SHA=$GITHUB_SHA"
            echo "Node: $(node -v)  npm: $(npm -v)"
            echo "Free mem before build:"; free -m || true

            # Force non-interactive output and disable Next.js telemetry banner
            export CI=1
            export NEXT_TELEMETRY_DISABLED=1

            time npm run build
            echo "Free mem after build:"; free -m || true
            echo "<<< [$(date -u +%H:%M:%S)] Build done"

      # ──────────────────────────────────────────────────────────────────
      # 2e. Restart pm2
      # ──────────────────────────────────────────────────────────────────
      - name: Restart pm2
        id: pm2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 5m
          script_stop: false
          envs: APP_DIR,LOG_DIR,PM2_APPS
          script: |
            set -eo pipefail
            exec 2>&1
            LOG_FILE="$LOG_DIR/$(date -u +%Y%m%dT%H%M%SZ)-pm2.log"
            exec > >(tee -a "$LOG_FILE") 2>&1

            echo ">>> [$(date -u +%H:%M:%S)] pm2 restart"
            cd "$APP_DIR"

            for app in $PM2_APPS; do
              if pm2 describe "$app" > /dev/null 2>&1; then
                echo "Deleting existing pm2 app: $app"
                pm2 delete "$app" 2>/dev/null || true
              else
                echo "No existing pm2 app: $app"
              fi
            done

            fuser -k 3003/tcp 2>/dev/null || true
            sleep 2

            pm2 start ecosystem.sandbox.config.js
            pm2 save
            pm2 ls
            echo "<<< [$(date -u +%H:%M:%S)] pm2 restarted"

      # ──────────────────────────────────────────────────────────────────
      # 2f. Health check (gates rollback)
      # ──────────────────────────────────────────────────────────────────
      - name: Health check
        id: health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 5m
          script_stop: false
          envs: APP_DIR,LOG_DIR,HEALTH_URL
          script: |
            set -eo pipefail
            exec 2>&1
            LOG_FILE="$LOG_DIR/$(date -u +%Y%m%dT%H%M%SZ)-health.log"
            exec > >(tee -a "$LOG_FILE") 2>&1

            echo ">>> [$(date -u +%H:%M:%S)] Health check"
            HTTP=000
            for i in $(seq 1 60); do
              sleep 1
              HTTP=$(curl -s -o /dev/null -m 5 -w "%{http_code}" "$HEALTH_URL" || echo 000)
              # Print a heartbeat every 5s so the log shows progress
              if [ $((i % 5)) -eq 0 ] || [ "$HTTP" = "200" ]; then
                echo "  t=${i}s http=$HTTP"
              fi
              if [ "$HTTP" = "200" ]; then
                echo "HTTP 200 after ${i}s"
                break
              fi
            done

            if [ "$HTTP" != "200" ]; then
              echo "❌ $HEALTH_URL returned $HTTP after 60s"
              echo "--- pm2 ls ---"
              pm2 ls || true
              echo "--- sandbox-web (last 80 lines) ---"
              pm2 logs sandbox-web --lines 80 --nostream || true
              echo "--- sandbox-worker (last 40 lines) ---"
              pm2 logs sandbox-worker --lines 40 --nostream || true
              exit 1
            fi

            echo "--- /api/health body ---"
            curl -s "$HEALTH_URL" | head -c 800
            echo ""
            echo "<<< [$(date -u +%H:%M:%S)] Healthy"

      # ──────────────────────────────────────────────────────────────────
      # 3. On failure: dump everything useful to the GitHub Actions log
      #    (recent deploy logs, pm2 status, pm2 logs, disk, memory)
      # ──────────────────────────────────────────────────────────────────
      - name: Collect failure logs from VPS
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 5m
          script_stop: false
          envs: APP_DIR,LOG_DIR
          script: |
            exec 2>&1
            echo ">>> Last 10 deploy log files:"
            ls -lt "$LOG_DIR" 2>/dev/null | head -11 || echo "(no logs)"
            echo ""
            echo ">>> Most recent deploy log (last 200 lines):"
            LATEST=$(ls -t "$LOG_DIR"/*.log 2>/dev/null | head -1 || echo "")
            if [ -n "$LATEST" ]; then
              echo "FILE: $LATEST"
              tail -200 "$LATEST"
            fi
            echo ""
            echo ">>> pm2 status:"
            pm2 ls || true
            echo ""
            echo ">>> sandbox-web logs (last 100 lines):"
            pm2 logs sandbox-web --lines 100 --nostream || true
            echo ""
            echo ">>> sandbox-worker logs (last 50 lines):"
            pm2 logs sandbox-worker --lines 50 --nostream || true
            echo ""
            echo ">>> Disk free:"
            df -h "$APP_DIR" || true
            echo ""
            echo ">>> Memory:"
            free -m || true

      # ──────────────────────────────────────────────────────────────────
      # 4. Rollback (only on failure)
      # ──────────────────────────────────────────────────────────────────
      - name: SSH rollback (only on deploy failure)
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SANDBOX_VPS_HOST }}
          username: ${{ secrets.SANDBOX_VPS_USER }}
          port: ${{ secrets.SANDBOX_VPS_PORT }}
          key: ${{ secrets.SANDBOX_VPS_SSH_KEY }}
          command_timeout: 15m
          script_stop: false
          envs: APP_DIR,LOG_DIR
          script: |
            set -eo pipefail
            exec 2>&1
            mkdir -p "$LOG_DIR"
            LOG_FILE="$LOG_DIR/$(date -u +%Y%m%dT%H%M%SZ)-rollback.log"
            exec > >(tee -a "$LOG_FILE") 2>&1

            echo ">>> [$(date -u +%H:%M:%S)] Rollback starting"
            cd "$APP_DIR"
            PREV_SHA=$(cat /tmp/itarang-sandbox-prev-sha 2>/dev/null || echo "")
            CURRENT_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            echo "PREV_SHA=$PREV_SHA  CURRENT_SHA=$CURRENT_SHA"

            if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "$CURRENT_SHA" ]; then
              echo "No rollback needed (PREV_SHA missing or already at PREV_SHA)"
              exit 0
            fi

            echo "Rolling back to $PREV_SHA"
            git reset --hard "$PREV_SHA"
            if [ -f .env ]; then sed -i 's/\r$//' .env; fi
            set -a; source .env 2>/dev/null || true; set +a
            export GITHUB_SHA=$(git rev-parse HEAD)
            export CI=1
            export NEXT_TELEMETRY_DISABLED=1
            time npm run build

            for app in sandbox-web sandbox-worker; do
              if pm2 describe "$app" > /dev/null 2>&1; then pm2 delete "$app" || true; fi
            done
            fuser -k 3003/tcp 2>/dev/null || true
            sleep 2
            pm2 start ecosystem.sandbox.config.js
            pm2 save
            echo "<<< [$(date -u +%H:%M:%S)] Rolled back to $PREV_SHA"

      # ──────────────────────────────────────────────────────────────────
      # 5. Slack notify result
      # ──────────────────────────────────────────────────────────────────
      - name: Slack notify result
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS="*succeeded*"
          else
            ICON=":x:"
            STATUS="*FAILED*"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"${ICON} Sandbox deploy ${STATUS} \`${{ github.sha }}\`\nLogs: ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL" || true

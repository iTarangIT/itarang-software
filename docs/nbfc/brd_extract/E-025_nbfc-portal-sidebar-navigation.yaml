id: E-025
slug: nbfc-portal-sidebar-navigation
name: NBFC portal sidebar navigation shell
source_section: "6.1.2"
brd_excerpt: |
  6.1.2 NBFC Portal Navigation
  Sidebar Item | Content
  📊 Portfolio Overview — Summary cards: Total Active Loans, Portfolio Value (₹), Avg EMI, Delinquency Rate (%), Disbursement This Month (₹). Cross-time charts.
  🔍 Lead Intelligence — Leads referred via iTarang. Status tracking: KYC → Sanctioned → Disbursed → Active → Closed. Filter by status, geography, product, date.
  🔋 Battery Monitoring — Real-time view of all batteries in their portfolio. SOH trend, SOC, GPS, charge cycles, usage patterns. CDS and PCI scores per borrower.
  ⚠️ Risk Alerts — Actionable alerts: EMI overdue, usage drop, offline battery, geo-shift. Each with recommended action and dual-approval gate where required.
  🔄 Recovery & Auction — Recovered batteries pipeline. Evaluation status. Live auction lots. Bidding interface. Post-auction settlement.
  📋 Audit Log — Immutable log of all NBFC-side actions. Filter by action type, date, user.
  ⚙️ Settings — NBFC user management (add/remove portal users), notification preferences, report subscriptions.
depends_on: []
non_functional:
  - "Sidebar must only render for users whose tenant has an active NBFC role."
  - "Audit Log link must always render — RBI Digital Lending Directions 2025 require an immutable, auditable trail for lender-side actions."

surface:
  api: []
  components:
    - "src/components/nbfc-portal/SidebarNav.tsx"
  jobs: []
  pages:
    - "/nbfc"

logic: |
  1. Render sidebar shell with seven items in fixed order: Portfolio Overview, Lead Intelligence, Battery Monitoring, Risk Alerts, Recovery & Auction, Audit Log, Settings.
  2. Each item is a Next.js Link to its route under /nbfc/*.
  3. Active item is highlighted based on current pathname prefix match.
  4. Sidebar collapses into hamburger drawer below md breakpoint.


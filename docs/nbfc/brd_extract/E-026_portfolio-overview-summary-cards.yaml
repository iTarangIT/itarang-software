id: E-026
slug: portfolio-overview-summary-cards
name: Portfolio Overview summary cards API
source_section: "6.1.3"
brd_excerpt: |
  6.1.3 Portfolio Overview
  Summary Cards
  Card | Data & Source
  Total Active Loans — COUNT(loan_sanctions) WHERE nbfc_id = X AND status = 'disbursed' AND closed_at IS NULL
  Portfolio Value (₹) — SUM(loan_amount) for active loans
  Disbursement This Month (₹) — SUM(disbursement_amount) WHERE disbursed_at in current calendar month
  Delinquency Rate (%) — (Overdue loans / Total active loans) × 100. Overdue = any EMI overdue > 30 days
  Avg Portfolio CDS — AVG(cds_score) across all active borrowers in portfolio. Refreshed daily.
  Recovery Value Locked — SUM(estimated_recovery_value) of batteries in recovery pipeline
depends_on: []
non_functional:
  - "All aggregates MUST be filtered by the calling NBFC tenant id — no cross-tenant data leakage."
  - "RBI Digital Lending Directions 2025: lenders must see only their own portfolio."

surface:
  api:
    - method: GET
      path: /api/nbfc/portfolio/summary
      auth: nbfc-tenant
      query_zod: |
        z.object({})
      response_shape:
        total_active_loans: number
        portfolio_value: number
        disbursement_this_month: number
        delinquency_rate: number
        avg_portfolio_cds: number
        recovery_value_locked: number
        computed_at: string
  components:
    - "src/components/nbfc-portal/PortfolioSummaryCards.tsx"
  jobs: []
  pages:
    - "/nbfc/portfolio"

logic: |
  1. Resolve current NBFC tenant via getCurrentTenant().
  2. total_active_loans = count of loan_sanctions WHERE nbfc_id = tenant.id AND status = 'disbursed' AND closed_at IS NULL.
  3. portfolio_value = sum of loan_sanctions.loan_amount for the same active set.
  4. disbursement_this_month = sum of loan_sanctions.disbursement_amount WHERE disbursed_at within current calendar month in IST.
  5. overdue_count = count of active loans whose latest emi has days_overdue > 30; delinquency_rate = (overdue_count / total_active_loans) * 100, rounded to 2 decimals; 0 when total_active_loans = 0.
  6. avg_portfolio_cds = average of borrower_risk_scores.cds_score across active borrowers for tenant.
  7. recovery_value_locked = sum of nbfc_recovery_pipeline.estimated_recovery_value for tenant rows in stages other than 'resold'.
  8. Return JSON with all six metrics plus computed_at = now ISO string.

tables_columns:
  reuse:
    - table: loan_sanctions
      schema_ts_line: 1
      columns: [id, nbfc_id, status, closed_at, loan_amount, disbursement_amount, disbursed_at]
  new:
    - table: borrower_risk_scores
      justification: "No existing table stores nightly-computed CDS/PCI per borrower; required for Avg Portfolio CDS card and downstream risk actions."
      columns:
        - { name: id, type: "uuid().primaryKey().defaultRandom()" }
        - { name: tenant_id, type: "uuid().notNull()" }
        - { name: borrower_id, type: "uuid().notNull()" }
        - { name: loan_sanction_id, type: "uuid().notNull()" }
        - { name: cds_score, type: "numeric({ precision: 5, scale: 2 })" }
        - { name: pci_score, type: "numeric({ precision: 4, scale: 3 })" }
        - { name: confidence, type: "varchar({ length: 16 })" }
        - { name: computed_at, type: "timestamp({ withTimezone: true }).notNull().defaultNow()" }
    - table: nbfc_recovery_pipeline
      justification: "No existing table tracks recovered batteries through evaluation/auction stages; required for Recovery Value Locked card and Section 6.1.7 stages."
      columns:
        - { name: id, type: "uuid().primaryKey().defaultRandom()" }
        - { name: tenant_id, type: "uuid().notNull()" }
        - { name: battery_serial, type: "varchar({ length: 64 }).notNull()" }
        - { name: stage, type: "varchar({ length: 32 }).notNull()" }
        - { name: estimated_recovery_value, type: "numeric({ precision: 12, scale: 2 })" }
        - { name: created_at, type: "timestamp({ withTimezone: true }).defaultNow()" }
        - { name: updated_at, type: "timestamp({ withTimezone: true }).defaultNow()" }

acceptance_criteria:
  - id: AC1
    statement: "GET /api/nbfc/portfolio/summary returns 200 with all six numeric fields and a computed_at ISO timestamp for the calling NBFC tenant."
    test_layer: api
    test_name: "Portfolio summary endpoint returns six metrics for the calling tenant"
  - id: AC2
    statement: "total_active_loans equals the count of loan_sanctions with status='disbursed' and closed_at IS NULL for that tenant only."
    test_layer: api
    test_name: "total_active_loans counts only disbursed open loans for the tenant"
  - id: AC3
    statement: "When total_active_loans is 0 the response returns delinquency_rate as 0 (not NaN or null)."
    test_layer: api
    test_name: "delinquency_rate is 0 when there are no active loans"
  - id: AC4
    statement: "A request from one NBFC tenant never returns aggregates that include rows belonging to another NBFC tenant."
    test_layer: api
    test_name: "Portfolio summary scopes aggregates strictly to the caller tenant"


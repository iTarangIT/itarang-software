id: E-105
slug: lead-creation-dealer-status-gate
name: "Lead creation dealer-status gate — POST /api/leads/create rejects when dealer not active, finance not enabled, or no active NBFC assigned"
source_section: "sync-audit-G-10"
brd_excerpt: |
  Resolution F — Lead Creation Gate — Dealer Status Check (G-10)

  F.1 LEAD CREATION — DEALER VALIDATION GATE

  POST /api/leads/create must validate the dealer's account status before creating a
  lead. This prevents leads from being created against unactivated or rejected dealers.

  POST /api/leads/create

  Pre-creation validation (before any lead record is inserted):
    1. Fetch dealers WHERE id = token.dealer_id
    2. IF dealer.onboarding_status != 'active':
         RETURN 403 {
           error: "DEALER_NOT_ACTIVE",
           message: "Your dealer account is not yet active. Current status: {status}.",
           currentStatus: dealer.onboarding_status
         }

    3. For finance-path leads (payment_method != 'Cash'):
       IF dealer.finance_enabled = false:
         RETURN 403 {
           error: "FINANCE_NOT_ENABLED",
           message: "Finance-path leads require Finance Enablement to be active.
                     Please contact iTarang to activate.",
         }

    4. For finance-path leads:
       Check dealer_nbfc_assignments:
         SELECT COUNT(*) WHERE dealer_id = :id AND status = 'active'
       IF count = 0:
         RETURN 403 {
           error: "NO_ACTIVE_NBFC",
           message: "No active lending partner is assigned to your account.
                     Please contact iTarang admin."
         }

    5. All checks passed → proceed with lead creation.

depends_on: []

non_functional:
  - "Sync Audit G-10: V2-Feb's POST /api/leads/create has no validation that the dealer is Active. A dealer in 'pending_admin_review' or 'request_correction' status could create leads. This unit closes that gap with three pre-insert guards."
  - "Guards must run server-side before any lead row is inserted — no UI-only enforcement."
  - "Error responses use stable string codes (DEALER_NOT_ACTIVE, FINANCE_NOT_ENABLED, NO_ACTIVE_NBFC) so dealer-portal UI can localise messages without parsing message text."
  - "Cash-path leads (payment_method='Cash') skip the finance_enabled and dealer_nbfc_assignments checks entirely; only the onboarding_status guard applies."
  - "All three guards return HTTP 403 (not 400 or 422) per Section F.1 spec."

surface:
  api:
    - method: POST
      path: /api/leads/create
      auth: nbfc-tenant
      request_zod: |
        z.object({
          customerName: z.string().min(1),
          customerPhone: z.string().min(10),
          paymentMethod: z.enum(['Cash', 'Other finance', 'Dealer finance']),
          productSelectionId: z.number().int().positive().optional(),
        })
      response_shape:
        ok: true
        leadId: "number"
  components: []
  jobs: []
  pages: []

logic: |
  1. Authenticate caller; resolve dealerId from session token.
  2. SELECT dealer FROM dealers WHERE id = token.dealer_id.
  3. If dealer.onboarding_status != 'active' return 403 { error: 'DEALER_NOT_ACTIVE', message, currentStatus }.
  4. If request.paymentMethod !== 'Cash' AND dealer.finance_enabled === false return 403 { error: 'FINANCE_NOT_ENABLED', message }.
  5. If request.paymentMethod !== 'Cash' run SELECT COUNT(*) FROM dealer_nbfc_assignments WHERE dealer_id = dealer.id AND status = 'active'; if count === 0 return 403 { error: 'NO_ACTIVE_NBFC', message }.
  6. Otherwise proceed to insert the lead row and return 200 { ok: true, leadId }.

tables_columns:
  reuse:
    - table: dealers
      schema_ts_line: 1
      columns: [id, onboarding_status, finance_enabled]
    - table: dealer_nbfc_assignments
      schema_ts_line: 1
      columns: [id, dealer_id, status]
    - table: leads
      schema_ts_line: 1
      columns: [id, dealer_id, payment_method]
  new: []

acceptance_criteria:
  - id: AC1
    statement: "POST /api/leads/create returns 403 with body.error='DEALER_NOT_ACTIVE' and body.currentStatus equal to the dealer's onboarding_status when the caller's dealer.onboarding_status is anything other than 'active'."
    test_layer: api
    test_name: "non-active dealer blocked from creating leads"
  - id: AC2
    statement: "POST /api/leads/create with paymentMethod='Other finance' returns 403 with body.error='FINANCE_NOT_ENABLED' when the active dealer has finance_enabled=false."
    test_layer: api
    test_name: "finance-path lead blocked when finance_enabled is false"
  - id: AC3
    statement: "POST /api/leads/create with paymentMethod='Dealer finance' returns 403 with body.error='NO_ACTIVE_NBFC' when the dealer has finance_enabled=true but zero rows in dealer_nbfc_assignments with status='active'."
    test_layer: api
    test_name: "finance-path lead blocked when no active NBFC assigned"
  - id: AC4
    statement: "POST /api/leads/create with paymentMethod='Cash' for an active dealer succeeds even when finance_enabled=false and no NBFC assignments exist."
    test_layer: api
    test_name: "cash-path lead skips finance and NBFC checks"
  - id: AC5
    statement: "POST /api/leads/create with paymentMethod='Other finance' for an active dealer with finance_enabled=true and at least one active dealer_nbfc_assignments row returns 200 and inserts a leads row."
    test_layer: api
    test_name: "all guards pass — finance lead created"
  - id: AC6
    statement: "POST /api/leads with dealer_id pointing at a dealer whose `onboarding_status` is in {'pending', 'rejected', 'inactive'} returns 422 with code='DEALER_NOT_ACTIVE' and the dealer's current status in the body. The lead row is NOT created. Only dealers with status='active' can have new leads. The server must validate the dealer and prevents leads from being created against unactivated or rejected dealers."
    test_layer: api
    test_name: "server validates dealer status and prevents lead creation for unactivated or rejected dealers"
    persona: dealer_user
    expected_response_shape:
      status: 422
      body:
        code: "DEALER_NOT_ACTIVE"
        currentStatus: "<one of: pending | rejected | inactive>"
      side_effects:
        leads_row_inserted: false


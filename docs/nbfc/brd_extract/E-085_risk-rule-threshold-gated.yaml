id: E-085
slug: risk-rule-threshold-gated
name: Risk rule threshold change gated by dual approval (iTarang Admin → Risk Head/Super Admin)
source_section: "6.4.3"
brd_excerpt: |
  Action: Risk Rule Threshold Change — Approver 1: iTarang Admin — Approver 2: iTarang Risk Head / Super Admin.

depends_on:
  - E-082

non_functional:
  - "RBI Digital Lending Directions 2025: changes to risk thresholds materially affect borrower outcomes; require two-person rule."
  - "Threshold change handler runs ONLY after dual_approval_requests.status='approved'."
  - "Threshold history is immutable: every change appended, never edited in place."

surface:
  api:
    - method: POST
      path: /api/nbfc/actions/risk-rule-threshold/initiate
      auth: admin
      request_zod: |
        z.object({ rule_key: z.string().min(1), current_threshold_json: z.record(z.unknown()), proposed_threshold_json: z.record(z.unknown()), reason_code: z.string().min(1), reviewed_evidence_ack: z.literal(true) })
      response_shape:
        approval_request_id: string
        status: pending_approval
        action_type: risk_rule_threshold_change
  components:
    - "src/components/admin/risk/ThresholdChangeForm.tsx"
  jobs: []
  pages: []

logic: |
  1. Validate body against request_zod.
  2. Verify caller has admin role (iTarang Admin); else 403.
  3. Capture evidence_snapshot containing current threshold + sample of last 50 risk decisions affected.
  4. createDualApprovalRequest({ action_type: 'risk_rule_threshold_change', entity_id: rule_key, evidence_snapshot, required_approver_role: 'itarang_risk_head_or_super_admin' }).
  5. On 'approved', handler appends row to nbfc_risk_rule_thresholds and updates active_threshold pointer.

tables_columns:
  reuse:
    - table: nbfc_tenants
      schema_ts_line: 2699
      columns: [id, slug]
  new:
    - table: nbfc_risk_rule_thresholds
      justification: "Append-only history of risk rule threshold changes tied to dual-approval; required for RBI auditability of rule mutations affecting credit decisions."
      columns:
        - { name: id, type: "uuid().primaryKey().defaultRandom()" }
        - { name: rule_key, type: "varchar({ length: 128 }).notNull()" }
        - { name: prior_threshold_json, type: "jsonb()" }
        - { name: new_threshold_json, type: "jsonb().notNull()" }
        - { name: approval_request_id, type: "uuid().notNull()" }
        - { name: applied_at, type: "timestamp({ withTimezone: true })" }
        - { name: applied_by, type: "uuid()" }
        - { name: is_active, type: "boolean().default(true).notNull()" }

acceptance_criteria:
  - id: AC1
    statement: "POST /api/nbfc/actions/risk-rule-threshold/initiate by an iTarang Admin returns 200 with approval_request_id and status='pending_approval'; no row in nbfc_risk_rule_thresholds yet."
    test_layer: api
    test_name: "Threshold change initiate creates approval without applying"
  - id: AC2
    statement: "POST initiate by a non-admin user returns 403."
    test_layer: api
    test_name: "Only iTarang Admin can initiate threshold change"
  - id: AC3
    statement: "After approval by an iTarang Risk Head or Super Admin user, exactly one new row in nbfc_risk_rule_thresholds exists with is_active=true; the previously active row for rule_key has is_active=false."
    test_layer: api
    test_name: "Threshold change activates only after second approver and supersedes prior"


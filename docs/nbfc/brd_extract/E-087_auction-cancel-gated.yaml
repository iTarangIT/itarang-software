id: E-087
slug: auction-cancel-gated
name: Auction lot cancellation gated by dual approval (Ops → Super Admin)
source_section: "6.4.3"
brd_excerpt: |
  Action: Auction Lot Cancellation — Approver 1: iTarang Ops — Approver 2: iTarang Super Admin.

depends_on:
  - E-082

non_functional:
  - "RBI Digital Lending Directions 2025: collateral disposal/cancellation requires two-person rule."
  - "Cancellation handler runs ONLY after dual_approval_requests.status='approved'."

surface:
  api:
    - method: POST
      path: /api/nbfc/actions/auction-cancel/initiate
      auth: admin
      request_zod: |
        z.object({ auction_lot_id: z.string().min(1), reason_code: z.enum(['borrower_settled','data_error','legal_hold','manual']), reviewed_evidence_ack: z.literal(true) })
      response_shape:
        approval_request_id: string
        status: pending_approval
        action_type: auction_lot_cancellation
  components:
    - "src/components/admin/auction/AuctionCancelInitiateForm.tsx"
  jobs: []
  pages: []

logic: |
  1. Validate body against request_zod.
  2. Verify caller role is 'itarang_ops'; else 403.
  3. Load auction lot to capture evidence_snapshot (current bids count, reserve price, scheduled date).
  4. createDualApprovalRequest({ action_type: 'auction_lot_cancellation', entity_id: auction_lot_id, evidence_snapshot, required_approver_role: 'itarang_super_admin' }).
  5. On 'approved', handler updates auction_lots.status='cancelled' and inserts cancellation log row.

tables_columns:
  reuse:
    - table: auction_lots
      schema_ts_line: 4131
      columns: [id, lot_code, status, ends_at]
  new:
    - table: nbfc_auction_lot_cancellations
      justification: "Records cancellation with link to dual-approval evidence; do not mutate auction lots in place to preserve audit trail."
      columns:
        - { name: id, type: "uuid().primaryKey().defaultRandom()" }
        - { name: auction_lot_id, type: "varchar({ length: 255 }).notNull()" }
        - { name: approval_request_id, type: "uuid().notNull()" }
        - { name: reason_code, type: "varchar({ length: 64 }).notNull()" }
        - { name: cancelled_at, type: "timestamp({ withTimezone: true })" }
        - { name: cancelled_by, type: "uuid()" }

acceptance_criteria:
  - id: AC1
    statement: "POST /api/nbfc/actions/auction-cancel/initiate by 'itarang_ops' returns 200 with approval_request_id and status='pending_approval'; auction lot status unchanged."
    test_layer: api
    test_name: "Auction cancel initiate creates approval without cancelling"
  - id: AC2
    statement: "POST initiate by user without role 'itarang_ops' returns 403."
    test_layer: api
    test_name: "Only iTarang Ops can initiate auction cancellation"
  - id: AC3
    statement: "After approval by an iTarang Super Admin user, exactly one row in nbfc_auction_lot_cancellations exists with cancelled_at non-null."
    test_layer: api
    test_name: "Auction cancellation executes only after Super Admin approves"

status: superseded_by_E-070
loop_count: 0
last_failure_signature: null
human_checkpoints: []
superseded_rationale: |
  E-070 (auction-cancel-lot-dual-approval, BRD §6.3.4) already ships the
  end-to-end auction-lot cancellation surface that this unit (BRD §6.4.3)
  formalises:
    * Two-person rule on auction-lot cancel (different admins, MFA, race-guard).
    * Same outcome: auction_lots.status='cancelled', battery returned to
      inventory, audit_logs entry with both actor IDs and reason.
    * Lives at /api/admin/nbfc/auction/lot/cancel/{request,approve} backed by
      nbfc_auction_cancel_requests + auctionCancelService.ts.
  The remaining differentiators in this unit (the Ops→Super Admin role-distinct
  gate via the E-082 dual_approval_requests primitive, the
  /api/nbfc/actions/auction-cancel/initiate endpoint, and a sibling
  nbfc_auction_lot_cancellations append-only log) are plumbing-layer reframings
  of the same business action; shipping them in parallel would create two
  competing cancel pipelines for the same lot and a second source of truth for
  cancellation state. Mirrors the E-034→E-084 supersession pattern (loan
  restructuring review action subsumed by the dual-approval restructuring unit).
  If/when the §6.4.3 role-distinct gate is reopened as a hard requirement, the
  follow-up should re-target E-070's existing nbfc_auction_cancel_requests
  table by adding a required_approver_role column and routing it through
  the E-082 dispatcher — NOT a parallel table.

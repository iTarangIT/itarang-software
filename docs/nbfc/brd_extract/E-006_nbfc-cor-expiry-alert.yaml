id: E-006
slug: nbfc-cor-expiry-alert
name: "RBI CoR expiry alert — notify admin 60 days before NBFC CoR expires"
source_section: "6.0.4"
brd_excerpt: |
  RBI Certificate of Registration (CoR) — Yes — Scanned copy. Expiry date captured. Alert admin 60 days before expiry.

depends_on: []

non_functional:
  - "Alert is idempotent for a given (nbfc_id, expiry_date) pair within the 60-day window — never send duplicates per scheduler tick."
  - "Cron tick frequency: daily at 06:00 IST."
  - "Alert delivery channel: email to all admin users with role IN (ceo, business_head, admin)."

surface:
  api:
    - method: GET
      path: /api/admin/nbfc/cor-expiry-alerts
      auth: admin
      query_zod: |
        z.object({
          windowDays: z.coerce.number().int().min(1).max(180).default(60),
        })
      response_shape:
        items:
          - nbfcId: "number"
            shortName: "string"
            corExpiryDate: "iso-date"
            daysToExpiry: "number"
  components: []
  jobs:
    - "src/lib/queue/jobs/checkNbfcCorExpiryJob.ts"
  pages: []

logic: |
  1. Cron job runs daily.
  2. SELECT nbfc rows where cor_expiry_date BETWEEN today AND today+60 days.
  3. For each, look up nbfc_cor_expiry_alerts to see if an alert already sent for this (nbfc_id, cor_expiry_date) pair.
  4. If not, send email to admin recipients and insert into nbfc_cor_expiry_alerts.
  5. Return count of alerts sent.

tables_columns:
  reuse:
    - table: nbfc
      schema_ts_line: 1
      columns: [id, short_name, cor_expiry_date]
  new:
    - table: nbfc_cor_expiry_alerts
      justification: "Tracks which (nbfc_id, expiry_date) pair has already been alerted to ensure idempotency across daily cron ticks."
      columns:
        - { name: id, type: "serial().primaryKey()" }
        - { name: nbfc_id, type: "integer().notNull().references(() => nbfc.id)" }
        - { name: cor_expiry_date, type: "date().notNull()" }
        - { name: alerted_at, type: "timestamp({ withTimezone: true }).defaultNow().notNull()" }

acceptance_criteria:
  - id: AC1
    statement: "GET /api/admin/nbfc/cor-expiry-alerts returns NBFCs whose cor_expiry_date is within the next 60 days, with daysToExpiry computed correctly."
    test_layer: api
    test_name: "expiry list returns NBFCs in the 60-day window"
  - id: AC2
    statement: "GET /api/admin/nbfc/cor-expiry-alerts excludes NBFCs whose cor_expiry_date is more than 60 days away."
    test_layer: api
    test_name: "expiry list excludes NBFCs outside the window"
  - id: AC3
    statement: "Running the cor-expiry job twice on the same day for the same NBFC inserts only one row into nbfc_cor_expiry_alerts."
    test_layer: api
    test_name: "alert send is idempotent per (nbfc_id, expiry_date)"

status: green

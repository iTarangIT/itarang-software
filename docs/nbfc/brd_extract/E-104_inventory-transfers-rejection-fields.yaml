id: E-104
slug: inventory-transfers-rejection-fields
name: "inventory_transfers schema extension — add rejected_by/rejected_at/rejection_reason and extend status ENUM with rejected_by_target and cancelled_by_admin"
source_section: "sync-audit-G-06"
brd_excerpt: |
  Resolution E — inventory_transfers — Extended Schema (G-06)

  E.1 CORRECTED inventory_transfers TABLE

  The V2-Feb schema has a 2-state status ENUM with no rejection path. Section 6.S.5
  specifies a reject-transfer workflow. The schema is updated to accommodate both.

  Column            | Type              | Notes
  id                | INT PK AUTO       |
  transfer_id       | VARCHAR(50) UNIQUE| TRF-YYYYMMDD-SEQ
  source_dealer_id  | INT FK            | references dealers.id
  target_dealer_id  | INT FK            | references dealers.id
  serials           | JSON              | Array of serial_numbers being transferred
  reason            | TEXT              | Admin-entered reason for transfer
  status            | ENUM              | 'pending_acknowledgement'|'completed'|'rejected_by_target'|'cancelled_by_admin'
  initiated_by      | INT FK            | admin_user_id
  initiated_at      | TIMESTAMP         |
  acknowledged_by   | INT NULL FK       | dealer_user_id — set on completed or rejected
  acknowledged_at   | TIMESTAMP NULL    |
  rejected_by       | INT NULL FK       | ★ NEW — dealer_user_id who rejected
  rejected_at       | TIMESTAMP NULL    | ★ NEW
  rejection_reason  | TEXT NULL         | ★ NEW — dealer's stated reason for rejection

depends_on: []

non_functional:
  - "Sync Audit G-06: V2-Feb inventory_transfers has a 2-state status ENUM ('pending_acknowledgement'|'completed') with no rejection path. Sec6.S defines a reject-transfer API but the underlying table was never updated. This unit aligns the V2-Feb schema with the Sec6 workflow."
  - "Status ENUM must extend (not replace) the existing two values — 'pending_acknowledgement' and 'completed' rows must continue to validate after migration."
  - "rejected_by, rejected_at, rejection_reason are mutually-set: when status='rejected_by_target' all three must be non-null; otherwise all three should remain null."
  - "The reject API itself is owned by Sec6.S.5 (separate unit); this unit only delivers the schema migration that the API depends on."

surface:
  api: []
  components: []
  jobs: []
  pages: []

logic: |
  1. Drizzle migration: extend inventory_transfers.status ENUM with values 'rejected_by_target' and 'cancelled_by_admin' (additive — keep existing two values).
  2. Same migration: ADD COLUMN rejected_by INT NULL with FK to dealer users.
  3. Same migration: ADD COLUMN rejected_at TIMESTAMPTZ NULL.
  4. Same migration: ADD COLUMN rejection_reason TEXT NULL.
  5. Add a CHECK constraint (or trigger) ensuring (rejected_by, rejected_at, rejection_reason) are all NULL or all non-NULL together.
  6. Update Drizzle schema TS to expose the three new columns as nullable and the wider status union type.

tables_columns:
  reuse:
    - table: inventory_transfers
      schema_ts_line: 1
      columns: [id, transfer_id, source_dealer_id, target_dealer_id, serials, reason, status, initiated_by, initiated_at, acknowledged_by, acknowledged_at]
  new:
    - table: inventory_transfers
      justification: "Sync Audit G-06 (MEDIUM): V2-Feb's 2-state status ENUM has no rejection path; Sec6.S.5 specifies a reject-transfer flow. Adds three nullable rejection columns and extends status ENUM with two new values to support the rejection workflow."
      columns:
        - { name: rejected_by, type: "integer()" }
        - { name: rejected_at, type: "timestamp({ withTimezone: true })" }
        - { name: rejection_reason, type: "text()" }

acceptance_criteria:
  - id: AC1
    statement: "After migration, inventory_transfers has columns rejected_by (int, nullable), rejected_at (timestamptz, nullable), and rejection_reason (text, nullable)."
    test_layer: api
    test_name: "rejection columns added with correct types and nullability"
  - id: AC2
    statement: "After migration, inventory_transfers.status accepts the values 'pending_acknowledgement', 'completed', 'rejected_by_target', and 'cancelled_by_admin'; an INSERT with any of these values succeeds."
    test_layer: api
    test_name: "status ENUM extended with rejection states"
  - id: AC3
    statement: "Existing rows with status='pending_acknowledgement' or 'completed' continue to read back identically after migration (no data loss)."
    test_layer: api
    test_name: "existing status values preserved"
  - id: AC4
    statement: "An INSERT with rejected_by set but rejected_at NULL (or any partial subset) fails the (rejected_by, rejected_at, rejection_reason) all-or-nothing check."
    test_layer: api
    test_name: "rejection columns enforced as a triplet"


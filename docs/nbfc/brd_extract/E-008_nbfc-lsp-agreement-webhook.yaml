id: E-008
slug: nbfc-lsp-agreement-webhook
name: Digio webhook handler — route NBFC_{nbfc_id} callbacks to NBFC LSP agreement update
source_section: 6.0.4a
brd_excerpt: "\"callback\":      \"NBFC_{nbfc_id}\",  // Routes webhook to NBFC flow\nagreement_status ENUM (shared with dealer agreements):\n  SENT_TO_EXTERNAL_PARTY → SIGN_PENDING → PARTIALLY_SIGNED →\
  \ SIGNED → COMPLETED → FAILED | EXPIRED\nsigned_pdf_url — TEXT NULL — S3 path: s3://bucket/nbfc/{nbfcId}/lsp-agreements/{id}_signed.pdf\naudit_trail_url — TEXT NULL — Digio audit trail PDF. Fetched on\
  \ COMPLETED.\n\n6.0.7 nbfc.lsp_agreement_id — ★ FK → nbfc_lsp_agreements.id. Set on LSP Agreement COMPLETED.\nEnables loan_sanctions → lsp_agreement audit link.\n"
depends_on: []
non_functional:
- Sync Audit G-01 / G-08 — webhook handler MUST distinguish NBFC_<id> callbacks from dealer callbacks by callback prefix.
- Webhook is idempotent — replays of the same Digio event must not create duplicate state transitions.
- On COMPLETED, signed PDF and audit-trail PDF MUST be fetched from Digio and uploaded to S3 path s3://bucket/nbfc/{nbfcId}/lsp-agreements/{id}_signed.pdf before status persisted.
surface:
  api:
  - method: POST
    path: /api/digio/webhook/nbfc
    auth: public
    request_zod: "z.object({\n  payload: z.object({\n    agreement_id: z.string(),\n    agreement_status: z.enum([\"SENT_TO_EXTERNAL_PARTY\",\"SIGN_PENDING\",\"PARTIALLY_SIGNED\",\"SIGNED\",\"COMPLETED\"\
      ,\"FAILED\",\"EXPIRED\"]),\n    callback: z.string().regex(/^NBFC_\\d+$/),\n    signed_document_url: z.string().url().optional(),\n    audit_trail_url: z.string().url().optional(),\n  }),\n})\n"
    response_shape:
      ok: true
  components: []
  jobs:
  - src/lib/queue/jobs/fetchSignedLspPdfJob.ts
  pages: []
logic: '1. Verify Digio webhook signature (shared verifier with dealer flow).

  2. Parse callback, extract nbfc_id; reject if format does not match NBFC_<digits>.

  3. Look up nbfc_lsp_agreements by agreement_id; 404 if not found.

  4. If existing agreement_status >= incoming status (per ENUM order), respond 200 ok (idempotent no-op).

  5. Update agreement_status, updated_at.

  6. If status=''COMPLETED'', enqueue job to fetch signed_pdf and audit_trail_url; on persist, update nbfc_lsp_agreements.signed_pdf_url, audit_trail_url, signing_date=today; set nbfc.lsp_agreement_id =
  nbfc_lsp_agreements.id.

  7. Return ok.

  '
tables_columns:

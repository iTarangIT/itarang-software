id: E-080
slug: compliance-screen-elements
name: Mandatory compliance metadata renderer for borrower-impacting screens
source_section: "6.4.2"
brd_excerpt: |
  6.4.2 Mandatory Compliance Elements by Screen
  Lender Identity (NBFC legal name): All borrower communication previews. Borrower notice in immobilisation confirmation.
  LSP Identity ('iTarang Battery Solutions'): All borrower communication previews. Every collection/recovery communication.
  Outstanding Amount + Restoration Steps: Immobilisation borrower notice. Collection reminder SMS template.
  Grievance Channel URL + Helpline: Immobilisation notice, every borrower SMS, NBFC portal footer, every collection interaction.
  Plain, Non-Coercive Language: All borrower-facing communications. Recovery calls, field visit instructions, SMS templates — reviewed against FPC.
  Reversibility Disclosure: Immobilisation confirmation screen: 'Battery can be re-mobilised within 2–4 hours after EMI settlement + dual approval.'
  Data Purpose Display: Every screen showing telemetry data: 'Why we use this data: loan risk assessment per your consent dated [date]. Withdraw consent →'
  Regulatory Footer: Every compliance-sensitive screen: 'This action complies with RBI Digital Lending Directions 2025 and Fair Practices Code.'

depends_on: []

non_functional:
  - "RBI Digital Lending Directions 2025: lender identity, LSP identity, grievance channel must appear on every borrower-facing communication."
  - "Fair Practices Code (FPC): borrower-facing language must be plain and non-coercive."
  - "DPDPA 2023: data purpose must be displayed on every screen showing telemetry."
  - "All compliance text is rendered server-side from a single source of truth so it cannot be locally muted."

surface:
  api:
    - method: GET
      path: /api/nbfc/compliance/screen-metadata
      auth: nbfc-tenant
      query_zod: |
        z.object({ screen: z.enum(['immobilisation_confirm','collection_sms','telemetry_view','portal_footer','recovery_call','sms_template']), lead_id: z.string().min(1).optional() })
      response_shape:
        screen: string
        lender_identity: { nbfc_legal_name: string, registration_no: string }
        lsp_identity: { name: "iTarang Battery Solutions" }
        grievance: { url: string, helpline: string }
        outstanding: { amount_inr: number, restoration_steps: "string[]" }
        reversibility_disclosure: string
        data_purpose: { text: string, consent_date: string, withdraw_url: string }
        regulatory_footer: string
  components:
    - "src/components/nbfc/compliance/ComplianceScreenBlock.tsx"
  jobs: []
  pages: []

logic: |
  1. Validate query against query_zod.
  2. Resolve tenant via getCurrentTenant() and requireNbfcAccess(tenant.id).
  3. Load nbfc_tenants row for lender legal name + registration number.
  4. Load nbfc_compliance_text rows for the requested screen key.
  5. If screen requires loan context (immobilisation_confirm, collection_sms, telemetry_view), load nbfc_loans + consent_records by lead_id and embed outstanding amount and consent_date.
  6. Compose response with lender_identity, lsp_identity (constant 'iTarang Battery Solutions'), grievance, reversibility_disclosure, data_purpose, regulatory_footer (constant FPC string).
  7. Return 200 with full block; return 400 if lead_id required but missing.

tables_columns:
  reuse:
    - table: nbfc_tenants
      schema_ts_line: 2699
      columns: [id, slug, display_name, is_active]
    - table: nbfc_loans
      schema_ts_line: 2729
      columns: [loan_application_id, tenant_id, outstanding_amount]
    - table: consent_records
      schema_ts_line: 1325
      columns: [id, lead_id, consent_type, signed_at]
  new:
    - table: nbfc_tenants
      justification: "Add nbfc_legal_name and rbi_registration_no — display_name is a brand label and the BRD requires the formal registered NBFC legal name plus RBI registration number for borrower communications under RBI DLD 2025."
      columns:
        - { name: nbfc_legal_name, type: "varchar({ length: 255 })" }
        - { name: rbi_registration_no, type: "varchar({ length: 64 })" }
        - { name: grievance_url, type: "text()" }
        - { name: grievance_helpline, type: "varchar({ length: 32 })" }
    - table: nbfc_compliance_text
      justification: "No existing table holds versioned compliance copy keyed by screen; needed so the same authoritative text renders across every borrower-facing screen and changes audit-trail."
      columns:
        - { name: id, type: "uuid().primaryKey().defaultRandom()" }
        - { name: tenant_id, type: "uuid().notNull().references(() => nbfcTenants.id)" }
        - { name: screen_key, type: "varchar({ length: 64 }).notNull()" }
        - { name: body_text, type: "text().notNull()" }
        - { name: version, type: "integer().default(1).notNull()" }
        - { name: effective_from, type: "timestamp({ withTimezone: true }).defaultNow().notNull()" }

acceptance_criteria:
  - id: AC1
    statement: "GET /api/nbfc/compliance/screen-metadata?screen=immobilisation_confirm&lead_id=L1 returns 200 with lender_identity.nbfc_legal_name, lsp_identity.name='iTarang Battery Solutions', grievance.url, grievance.helpline, outstanding.amount_inr, reversibility_disclosure containing '2–4 hours', and regulatory_footer mentioning 'RBI Digital Lending Directions 2025'."
    test_layer: api
    test_name: "Compliance metadata for immobilisation screen returns all mandatory elements"
  - id: AC2
    statement: "GET with screen=immobilisation_confirm and no lead_id returns 400."
    test_layer: api
    test_name: "Compliance metadata rejects immobilisation screen request missing lead_id"
  - id: AC3
    statement: "GET with screen=telemetry_view&lead_id=L1 returns data_purpose.text containing 'loan risk assessment' and a non-empty data_purpose.consent_date matching consent_records.signed_at."
    test_layer: api
    test_name: "Telemetry screen returns DPDPA purpose and consent date"
  - id: AC4
    statement: "Unauthenticated request to GET /api/nbfc/compliance/screen-metadata returns 401."
    test_layer: api
    test_name: "Compliance metadata endpoint requires NBFC auth"


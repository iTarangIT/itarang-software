    - telemetry_daily_summary table:  not defined (deferred to E-047)
    - inventory.iot_enabled column:   not present (deferred to E-045)

  Dependency status:
    - E-045 device-registration:        status=needs_clarification, audit verdict=reject
    - E-047 telemetry-storage-schema:   status=needs_clarification, audit verdict=reject

  Per Wave-1 lesson #3 ("latent table dep → halt blocked, do not silently
  degrade") and the loop runner's blocked-on-missing-dep contract, this unit
  cannot be implemented end-to-end without first landing E-045 and E-047 (or
  promoting their tables into a shared migration). Halting at step 0 with no
  code changes; no commit produced.

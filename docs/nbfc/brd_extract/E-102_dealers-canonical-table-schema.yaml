id: E-102
slug: dealers-canonical-table-schema
name: Canonical dealers table — first-time definition with INT PK id and human-readable VARCHAR dealer_id (DLR-NNN)
source_section: sync-audit-G-04
brd_excerpt: 'Resolution D — dealers Table — Canonical Schema (G-04 / G-08)


  D.1 CANONICAL dealers TABLE (Defined for the First Time)


  Why This Is Critical

  The dealers table is referenced as a FK target by: inventory.dealer_id, leads.dealer_id,

  coupons.dealer_id, coupon_batches.dealer_id, kyc_documents.lead_id (indirectly),

  product_selections.submitted_by, after_sales_records.dealer_id, warranties.dealer_id,

  paraphernalia_stock.dealer_id, inventory_upload_events.dealer_id,

  dealer_nbfc_assignments.dealer_id. None of the three BRDs define this table.

  Resolving this eliminates G-04 and G-08.


  Column                  | Type                 | Notes

  id                      | INT PK AUTO          | Internal integer PK. Used for all FK references in other tables.

  dealer_id               | VARCHAR(50) UNIQUE   | Human-readable ID: DLR-001, DLR-002. Generated on activation.

  company_name            | VARCHAR(200)         | Legal company name from onboarding Step 1.

  company_type            | ENUM                 | ''sole_proprietorship''|''partnership_firm''|''private_limited''

  gst_number              | VARCHAR(20)          | Validated on onboarding.

  pan_number              | VARCHAR(20)          |

  registered_address      | JSON                 | {line1, line2, city, district, state, pin}

  bank_name               | VARCHAR(200)         |

  bank_account_number     | VARCHAR(50)          | Stored encrypted.

  bank_ifsc               | VARCHAR(20)          |

  bank_beneficiary        | VARCHAR(200)         |

  bank_branch             | VARCHAR(200)         |

  bank_account_type       | ENUM                 | ''current''|''savings''|''od''

  owner_name              | VARCHAR(200)         | Primary owner / partner 1 / director 1

  owner_phone             | VARCHAR(20)          |

  owner_email             | VARCHAR(200)         | Used as dealer login User ID on activation.

  finance_enabled         | BOOLEAN DEFAULT FALSE| Set TRUE when dealer finance agreement (Digio) COMPLETED and admin approves.

  onboarding_status       | ENUM                 | ''draft''|''pending_admin_review''|''request_correction''|''approved''|''active''|''rejected''

  application_id          | VARCHAR(50)          | Links to dealer_applications.application_id from V2-Feb-2 onboarding flow.

  created_at              | TIMESTAMP            |

  updated_at              | TIMESTAMP            |

  activated_at            | TIMESTAMP NULL       | Set when onboarding_status = ''active''.


  dealer_id vs dealers.id — Usage Rule

  All FK references in other tables use dealers.id (INT). The human-readable dealer_id

  VARCHAR (DLR-001) is used in APIs, UI displays, file paths (S3), and upload validation

  messages. Never use the VARCHAR dealer_id as a DB FK — always use the INT id.

  In API responses, always return both: { id: 42, dealerId: ''DLR-001'' }.

  '
depends_on: []
non_functional:
- 'Sync Audit G-04: dealers table is referenced as FK target by inventory, leads, coupons, coupon_batches, after_sales_records, warranties, paraphernalia_stock, inventory_upload_events, dealer_nbfc_assignments
  — yet never defined in any of the three BRDs. This unit creates the canonical definition.'
- 'Sync Audit G-08: V2-Feb uses INT FK; V2-Feb-2 generates VARCHAR dealer_id (DLR-001); Sec6 uses INT FK. Resolution: INT PK ''id'' for FKs, VARCHAR(50) UNIQUE ''dealer_id'' for display.'
- bank_account_number column must be stored encrypted at rest (DPDPA — financial PII).
- API responses MUST always return both numeric id and human-readable dealerId; never use VARCHAR dealer_id as a DB FK.
- dealer_id (DLR-NNN) is generated only when onboarding_status transitions to 'active' (mirrors V2-Feb-2 activation flow).
surface:
  api:
  - method: GET
    path: /api/admin/dealers/{dealerId}
    auth: admin
    query_zod: 'z.object({})

      '
    response_shape:
      id: number
      dealerId: string
      companyName: string
      onboardingStatus: '''draft''|''pending_admin_review''|''request_correction''|''approved''|''active''|''rejected'''
      financeEnabled: boolean
      activatedAt: iso-datetime|null
  components: []
  jobs: []
  pages: []
logic: '1. Create dealers table with the columns and types listed in Section D.1.

  2. Make id the INT AUTO PK; make dealer_id a VARCHAR(50) UNIQUE with no default (populated at activation).

  3. Encrypt bank_account_number at rest (column-level encryption helper).

  4. GET /api/admin/dealers/{dealerId} accepts the path param as either the INT id OR the VARCHAR dealer_id and returns both fields in the response.

  5. Response body always includes both keys: id (number) and dealerId (string), even when dealerId is null pre-activation.

  '
tables_columns:
  reuse: []
  new:
  - table: dealers
    justification: 'First-time canonical definition of the dealers table. No canonical dealers table exists today — yet `dealer_id` already appears across 10+ tables (inventory, leads, coupons, coupon_batches,
      after_sales_records, paraphernalia_stock, inventory_upload_events, dealer_subscriptions, dealer_leads, dealer_onboarding_applications) as either varchar(50) or integer FK. Those existing references
      are the CONSUMERS of the canonical dealer entity that this unit now formalises. The 16 fuzzy collisions reported by the auditor on `dealer_id` and adjacent columns (company_name, gst_number, pan_number,
      owner_name, owner_email, bank_name, bank_account_number, finance_enabled, onboarding_status, application_id, etc.) are EXPECTED and INTENTIONAL — they exist on `dealer_onboarding_applications` (the
      in-flight application record), and the BRD''s Resolution D explicitly distinguishes the in-flight `dealer_onboarding_applications` table from the post-activation canonical `dealers` table. Migration
      plan: add this table now; future schema work (out of scope of this unit) updates the consuming tables'' FKs to point at dealers.id. dealer_id is varchar(50) per BRD (DLR-NNN format, generated only
      on activation) and is UNIQUE; the integer `id` is the canonical FK target. Closes Sync Audit G-04 (CRITICAL) and G-08 (MEDIUM).'
    columns:
    - name: id
      type: serial().primaryKey()
    - name: dealer_id
      type: 'varchar({ length: 50 }).unique()'
    - name: company_name
      type: 'varchar({ length: 200 }).notNull()'

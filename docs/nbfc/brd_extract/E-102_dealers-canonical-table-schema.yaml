      type: 'varchar({ length: 32 }).notNull()'
    - name: gst_number
      type: 'varchar({ length: 20 })'
    - name: pan_number
      type: 'varchar({ length: 20 })'
    - name: registered_address
      type: jsonb()
    - name: bank_name
      type: 'varchar({ length: 200 })'
    - name: bank_account_number
      type: 'varchar({ length: 200 })'
    - name: bank_ifsc
      type: 'varchar({ length: 20 })'
    - name: bank_beneficiary
      type: 'varchar({ length: 200 })'
    - name: bank_branch
      type: 'varchar({ length: 200 })'
    - name: bank_account_type
      type: 'varchar({ length: 16 })'
    - name: owner_name
      type: 'varchar({ length: 200 })'
    - name: owner_phone
      type: 'varchar({ length: 20 })'
    - name: owner_email
      type: 'varchar({ length: 200 })'
    - name: finance_enabled
      type: boolean().default(false).notNull()
    - name: onboarding_status
      type: 'varchar({ length: 32 }).notNull().default(''draft'')'
    - name: application_id
      type: 'varchar({ length: 50 })'
    - name: created_at
      type: 'timestamp({ withTimezone: true }).defaultNow().notNull()'
    - name: updated_at
      type: 'timestamp({ withTimezone: true }).defaultNow().notNull()'
    - name: activated_at
      type: 'timestamp({ withTimezone: true })'
acceptance_criteria:
- id: AC1
  statement: Migration creates a 'dealers' table with INT PK 'id' and VARCHAR(50) UNIQUE 'dealer_id' columns and all 22 columns listed in Section D.1.
  test_layer: api
  test_name: dealers table exists with canonical columns
- id: AC2
  statement: Inserting two dealer rows with the same dealer_id value fails with a UNIQUE constraint violation.
  test_layer: api
  test_name: dealer_id UNIQUE constraint enforced
- id: AC3
  statement: GET /api/admin/dealers/{dealerId} resolves the path parameter when given either the numeric id (e.g. '42') or the VARCHAR dealer_id (e.g. 'DLR-001').
  test_layer: api
  test_name: lookup accepts both id and dealerId
- id: AC4
  statement: Response body always contains both 'id' (number) and 'dealerId' (string|null) fields.
  test_layer: api
  test_name: response always returns id and dealerId pair
- id: AC5
  statement: onboarding_status defaults to 'draft' when a row is inserted without an explicit value.
  test_layer: api
  test_name: onboarding_status defaults to draft

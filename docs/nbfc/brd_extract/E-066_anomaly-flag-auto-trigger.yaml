id: E-066
slug: anomaly-flag-auto-trigger
name: Auto Anomaly Flag on NBFC record when comparison metrics breach thresholds
source_section: "6.3.2"
brd_excerpt: |
  Red/amber indicators trigger an automatic 'Anomaly Flag' on the NBFC record. iTarang Ops team notified for investigation.

depends_on: []
non_functional:
  - "Notification to iTarang Ops team must be auditable"
  - "Anomaly flag is system-set; not user-set"
  - "Re-evaluated whenever comparison metrics refresh"

surface:
  api:
    - method: POST
      path: /api/admin/nbfc/anomaly-flag/evaluate
      auth: admin
      request_zod: |
        z.object({
          nbfc_id: z.string().uuid().optional()
        }).strict()
      response_shape:
        evaluated_count: "number"
        flagged:
          - nbfc_id: "uuid"
            severity: "red|amber"
            reasons: ["string"]
  jobs:
    - "src/lib/jobs/nbfc/evaluateAnomalyFlags.ts (cron, runs after metric refresh)"
  components: []
  pages: []

logic: |
  1. Load comparison metrics for each active NBFC (delinquency_pct, avg_cds, recovery_rate_pct).
  2. Apply thresholds: red if delinquency_pct >= 7.0 or avg_cds >= 40 or recovery_rate_pct < 60.
  3. Apply thresholds: amber if delinquency_pct >= 5.0 or avg_cds >= 30 or recovery_rate_pct < 70.
  4. For each NBFC matching red/amber, upsert anomaly_flag row with severity and reasons array.
  5. Clear anomaly_flag when NBFC no longer matches red or amber thresholds.
  6. For each newly-set red/amber flag, enqueue notification to iTarang Ops team.
  7. Return evaluated_count and flagged array.

tables_columns:
  reuse: []
  new:
    - table: nbfc_anomaly_flags
      justification: "Persistent record of auto-flagged NBFCs with severity and reasons; required so Ops team can track open investigations and the flag survives between metric refreshes."
      columns:
        - { name: id, type: "uuid().primaryKey().defaultRandom()" }
        - { name: nbfc_id, type: "uuid().notNull().references(() => nbfcTenants.id)" }
        - { name: severity, type: "varchar({ length: 10 }).notNull()" }
        - { name: reasons, type: "jsonb().notNull()" }
        - { name: flagged_at, type: "timestamp({ withTimezone: true }).defaultNow().notNull()" }
        - { name: cleared_at, type: "timestamp({ withTimezone: true })" }

acceptance_criteria:
  - id: AC1
    statement: "Running POST /api/admin/nbfc/anomaly-flag/evaluate creates an anomaly_flags row with severity='red' for an NBFC whose delinquency_pct = 7.8."
    test_layer: api
    test_name: "Evaluate flags red anomaly for NBFC with delinquency 7.8"
  - id: AC2
    statement: "Running POST /api/admin/nbfc/anomaly-flag/evaluate clears (sets cleared_at) the anomaly flag of an NBFC whose metrics have returned below thresholds."
    test_layer: api
    test_name: "Evaluate clears anomaly flag when metrics recover"
  - id: AC3
    statement: "Endpoint requires admin auth; non-admin caller receives 403."
    test_layer: api
    test_name: "Evaluate endpoint rejects non-admin with 403"

status: needs_clarification
loop_count: 0
last_failure_signature: null

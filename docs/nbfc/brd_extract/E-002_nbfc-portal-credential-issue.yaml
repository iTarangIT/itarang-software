id: E-002
slug: nbfc-portal-credential-issue
name: "NBFC activation — generate portal credentials and email primary contact"
source_section: "6.0.2"
brd_excerpt: |
  Step 6 — Activation
  On approval: NBFC status = active. Portal credentials generated and sent to primary_contact_email.
  NBFC appears in admin loan sanction dropdown for dealers in dealer_nbfc_assignments table (Section 6.0.8).

depends_on: []

non_functional:
  - "Sync Audit G-01 — activation must align with dealer onboarding portal-credential pattern."
  - "Generated password must be high-entropy (≥16 chars, mixed case + digits + symbol) and stored hashed only."
  - "Email send failure must mark activation as 'credential_dispatch_failed' and surface to admin for retry — never silently lose state."

surface:
  api:
    - method: POST
      path: /api/admin/nbfc/{nbfcId}/activate
      auth: admin
      request_zod: |
        z.object({
          resend: z.boolean().optional(),
        })
      response_shape:
        ok: true
        nbfcId: "number"
        status: "active"
        credentialDispatchedTo: "string"
  components:
    - "src/components/admin/nbfc/NbfcActivationButton.tsx"
  jobs:
    - "src/lib/queue/jobs/sendNbfcPortalCredentialsJob.ts"
  pages: []

logic: |
  1. Resolve NBFC; require nbfc.status='approved' (else return 409 'must be approved before activation').
  2. Create supabase auth user for primary_contact_email if absent; assign role='nbfc_partner'.
  3. Generate one-time password; persist hashed credential record in nbfc_portal_credentials.
  4. Set nbfc.status='active', activated_at=now().
  5. Enqueue email job to send credentials to primary_contact_email; on enqueue failure, revert status to 'approved' and return 500.
  6. Return ok with credentialDispatchedTo (masked email).

tables_columns:
  reuse:
    - table: nbfc
      schema_ts_line: 1
      columns: [id, status, primary_contact_email]
  new:
    - table: nbfc
      justification: "Adds activated_at audit column to record activation timestamp distinct from approved_at, per BRD Step 6."
      columns:
        - { name: activated_at, type: "timestamp({ withTimezone: true })" }
    - table: nbfc_portal_credentials
      justification: "No existing table records portal credential issuance for NBFC partners — required for audit and resend flow."
      columns:
        - { name: id, type: "uuid().primaryKey().defaultRandom()" }
        - { name: nbfc_id, type: "integer().notNull().references(() => nbfc.id)" }
        - { name: supabase_user_id, type: "uuid().notNull()" }
        - { name: email_dispatched_at, type: "timestamp({ withTimezone: true })" }
        - { name: dispatch_status, type: "varchar({ length: 32 }).notNull()" }
        - { name: created_at, type: "timestamp({ withTimezone: true }).defaultNow()" }

acceptance_criteria:
  - id: AC1
    statement: "POST /api/admin/nbfc/{nbfcId}/activate returns 409 when nbfc.status != 'approved'."
    test_layer: api
    test_name: "activate rejects non-approved NBFC"
  - id: AC2
    statement: "On successful activation, nbfc.status is set to 'active' and a row is inserted into nbfc_portal_credentials for that nbfc_id."
    test_layer: api
    test_name: "activate persists status=active and creates credential row"
  - id: AC3
    statement: "An email job is enqueued addressed to nbfc.primary_contact_email containing the generated password."
    test_layer: api
    test_name: "activate enqueues credential email to primary_contact_email"

